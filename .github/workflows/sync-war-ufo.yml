name: Sync WAR UFO releases

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Discover official WAR UFO bundles
        run: npm run discover:war-bundles

      - name: Sync official WAR UFO records
        run: npm run sync:war

      - name: Verify
        run: |
          npm run lint
          npm run typecheck
          npm run validate:data
          npm run build

      - name: Open data sync pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(data): sync official UFO release data"
          title: "chore(data): sync official UFO release data"
          body: |
            Automated sync from official WAR UFO release sources.

            This PR updates only generated data and official-source registry files after running:

            - `npm run discover:war-bundles`
            - `npm run sync:war`
            - `npm run lint`
            - `npm run typecheck`
            - `npm run validate:data`
            - `npm run build`
          branch: automated/war-ufo-sync
          delete-branch: true
          add-paths: |
            data/cases.json
            data/releases.json
            data/sync-metadata.json
            data/official-bundles.json
            data/official-release-pages.json
