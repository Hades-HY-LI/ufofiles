name: Sync WAR UFO releases

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: war-ufo-sync-automated-pr
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ${{ fromJSON(vars.WAR_UFO_RUNNER == 'ufo-sync' && '["self-hosted","ufo-sync"]' || '["ubuntu-latest"]') }}
    steps:
      - name: Validate runner selection
        env:
          WAR_UFO_RUNNER: ${{ vars.WAR_UFO_RUNNER }}
        run: |
          case "$WAR_UFO_RUNNER" in
            ""|"ubuntu-latest"|"ufo-sync") ;;
            *)
              echo "Unsupported WAR_UFO_RUNNER value. Use ubuntu-latest, ufo-sync, or leave it unset." >&2
              exit 1
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Discover official WAR UFO bundles
        run: npm run discover:war-bundles

      - name: Sync official WAR UFO records
        run: npm run sync:war

      - name: Verify
        run: |
          npm run lint
          npm test
          npm run build

      - name: Require a fresh sync
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const metadata = JSON.parse(
            fs.readFileSync('data/sync-metadata.json', 'utf8'),
          );

          if (metadata.status !== 'fresh') {
            const message = 'The sync did not produce fresh metadata. No automated data PR was created.';
            console.error(`WAR UFO sync health gate failed: ${message}`);

            if (process.env.GITHUB_STEP_SUMMARY) {
              fs.appendFileSync(
                process.env.GITHUB_STEP_SUMMARY,
                `## WAR UFO sync blocked\n\n${message}\n`,
              );
            }

            process.exit(1);
          }
          NODE

      - name: Open data sync pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(data): sync official UFO release data"
          title: "chore(data): sync official UFO release data"
          body: |
            Automated sync from official WAR UFO release sources.

            This PR updates only generated data and official-source registry files after running:

            - `npm run discover:war-bundles`
            - `npm run sync:war`
            - `npm run lint`
            - `npm test`
            - `npm run build`
          branch: automated/war-ufo-sync
          delete-branch: true
          add-paths: |
            data/**
